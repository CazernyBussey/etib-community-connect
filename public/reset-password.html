<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password | ETIB Directory</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="index.html">
        <img src="assets/etib-logo.png" alt="Even Though I’m Blind Directory logo" />
        <span class="brand-text">
          <strong>ETIB Community Connect Directory</strong>
          <span>Create a new password</span>
        </span>
      </a>
    </div>
  </header>

  <main id="main-content">
    <section class="container">
      <div class="panel" style="padding:16px; margin:18px 0; max-width:720px;">
        <h1>Reset your password</h1>
        <p>Choose a new password with at least 10 characters.</p>
        <form class="form-layout" id="reset-password-form" novalidate aria-describedby="reset-help reset-status">
          <p id="reset-help" class="small">This page works only when opened from the reset email link.</p>
          <div class="field">
            <label for="reset-password">New password <span class="req">*</span></label>
            <input id="reset-password" name="password" type="password" autocomplete="new-password" required />
          </div>
          <div class="field">
            <label for="reset-password-confirm">Confirm new password <span class="req">*</span></label>
            <input id="reset-password-confirm" name="passwordConfirm" type="password" autocomplete="new-password" required />
          </div>
          <div class="cta-row">
            <button class="btn btn-primary" type="submit">Update Password</button>
            <a class="btn" href="login.html">Back to Sign In</a>
          </div>
          <p id="reset-status" class="small" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="auth-accessibility.js"></script>
</body>
</html>
