<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forgot Password | ETIB Directory</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="index.html">
        <img src="assets/etib-logo.png" alt="Even Though I’m Blind Directory logo" />
        <span class="brand-text">
          <strong>ETIB Community Connect Directory</strong>
          <span>Secure password recovery</span>
        </span>
      </a>
    </div>
  </header>

  <main id="main-content">
    <section class="container">
      <div class="panel" style="padding:16px; margin:18px 0; max-width:720px;">
        <h1>Forgot your password?</h1>
        <p>Enter your account email and we will send you a secure password reset link if the account exists.</p>
        <form class="form-layout" id="forgot-password-form" novalidate aria-describedby="forgot-help forgot-status">
          <p id="forgot-help" class="small">Enter the same email you use to sign in.</p>
          <div class="field">
            <label for="forgot-email">Email <span class="req">*</span></label>
            <input id="forgot-email" name="email" type="email" autocomplete="email username" required />
          </div>
          <div class="cta-row">
            <button class="btn btn-primary" type="submit">Send Reset Link</button>
            <a class="btn" href="login.html">Back to Sign In</a>
          </div>
          <p id="forgot-status" class="small" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="auth-accessibility.js"></script>
</body>
</html>
