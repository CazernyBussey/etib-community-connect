<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign Up | ETIB Directory</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="index.html">
        <img src="assets/etib-logo.png" alt="Even Though I’m Blind Directory logo" />
        <span class="brand-text">
          <!-- Only the site title is included here to avoid repeating the tagline -->
          <strong>ETIB Community Connect Directory</strong>
        </span>
      </a>
      <nav class="site-nav" aria-label="Directory site navigation">
        <ul id="siteNavList">
          <li><a href="index.html">Directory</a></li>
          <li><a href="advertise.html">Advertise</a></li>
          <li><a href="owner-dashboard.html">Dashboard</a></li>
          <li><a href="admin-dashboard.html">Admin</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main id="main-content">
    <section class="container">
      <div class="panel" style="padding:16px; margin: 18px 0;">
        <h1>Create your account</h1>
        <!-- Signup form collects first and last name along with email and password -->
        <form class="form-layout" novalidate>
          <div class="form-grid-2">
            <div class="field">
              <label for="signup-first-name">First name <span class="req">*</span></label>
              <input id="signup-first-name" name="firstName" type="text" required />
            </div>
            <div class="field">
              <label for="signup-last-name">Last name <span class="req">*</span></label>
              <input id="signup-last-name" name="lastName" type="text" required />
            </div>
          </div>
          <div class="field">
            <label for="signup-email">Email <span class="req">*</span></label>
            <input id="signup-email" name="email" type="email" required />
          </div>
          <div class="field">
            <label for="signup-password">Password <span class="req">*</span></label>
            <input id="signup-password" name="password" type="password" required />
          </div>
          <div class="cta-row">
            <button class="btn btn-primary" type="submit">Create Account</button>
          </div>
          <p>Already have an account? <a href="login.html">Sign in</a></p>
        </form>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
