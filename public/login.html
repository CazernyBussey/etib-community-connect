<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign In | ETIB Directory</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="index.html">
        <img src="assets/etib-logo.png" alt="Even Though I’m Blind Directory logo" />
        <span class="brand-text">
          <strong>ETIB Community Connect Directory</strong>
        </span>
      </a>
      <nav class="site-nav" aria-label="Directory site navigation">
        <ul id="siteNavList">
          <li><a href="index.html">Directory</a></li>
          <li><a href="advertise.html">Advertise</a></li>
          <!-- Removed Add Business, Sign In, and Sign Up nav items to simplify the login page -->
          <li><a href="owner-dashboard.html">Dashboard</a></li>
          <li><a href="admin-dashboard.html">Admin</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main id="main-content">
    <section class="container">
      <div class="panel" style="padding:16px; margin: 18px 0;">
        <h1>Sign In</h1>
        <form class="form-layout" novalidate>
          <div class="field">
            <label for="login-email">Email <span class="req">*</span></label>
            <input id="login-email" name="email" type="email" required />
          </div>
          <div class="field">
            <label for="login-password">Password <span class="req">*</span></label>
            <input id="login-password" name="password" type="password" required />
          </div>
          <div class="cta-row">
            <button class="btn btn-primary" type="submit">Sign In</button>
          </div>
          <!-- Removed forgot password link to keep the page focused on signing in -->
          <p>Don’t have an account? <a href="signup.html">Sign up</a></p>
        </form>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
