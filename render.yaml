services:
  - type: web
    name: etib-community-connect
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    disks:
      - name: etib-data
        mountPath: /var/data
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: AUTH_RATE_WINDOW_MS
        value: "900000"
      - key: AUTH_RATE_MAX
        value: "10"
      - key: DB_PATH
        value: /var/data/etib.db
