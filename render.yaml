services:
  - type: web
    name: etib-community-connect
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: AUTH_RATE_WINDOW_MS
        value: "900000"
      - key: AUTH_RATE_MAX
        value: "10"
